---
- name: Configuration des interfaces du routeur CSR1000
  hosts: csr1000
  gather_facts: no

  tasks:
    - name: Configuration des adresses IP L3
      cisco.ios.ios_l3_interfaces:
        config:
          - name: GigabitEthernet2
            ipv4:
              - address: 192.168.2.1/24
          - name: GigabitEthernet3
            ipv4:
              - address: 192.168.3.1/24
          - name: GigabitEthernet4
            ipv4:
              - address: 192.168.4.1/24
        state: merged

    - name: Configuration DHCP sur GigabitEthernet1
      cisco.ios.ios_config:
        lines:
          - ip address dhcp
        parents: interface GigabitEthernet1

    - name: Activation et description des interfaces
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: Lien WAN DHCP
            enabled: true
          - name: GigabitEthernet2
            description: LAN Entreprise
            enabled: true
          - name: GigabitEthernet3
            description: LAN DMZ
            enabled: true
          - name: GigabitEthernet4
            description: LAN ADMIN
            enabled: true
        state: merged

    - name: Suppression pool DHCP existant
      cisco.ios.ios_config:
        lines:
          - no ip dhcp pool LAN_ENTREPRISE

    - name: Configuration serveur DHCP
      cisco.ios.ios_config:
        lines:
          - network 192.168.2.0 255.255.255.0
          - default-router 192.168.2.1
          - dns-server 8.8.8.8
        parents: ip dhcp pool LAN_ENTREPRISE