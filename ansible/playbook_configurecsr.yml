---
- name: Configuration des interfaces du routeur CSR1000
  hosts: csr1000
  gather_facts: no

  tasks:
    - name: Configuration des adresses IP L3
      cisco.ios.ios_l3_interfaces:
        config:
          - name: GigabitEthernet2
            ipv4:
              - address: 192.168.2.1/24
          - name: GigabitEthernet3
            ipv4:
              - address: 192.168.3.1/24
          - name: GigabitEthernet4
            ipv4:
              - address: 192.168.4.1/24
        state: merged

    - name: Configuration DHCP sur GigabitEthernet1
      cisco.ios.ios_config:
        lines:
          - ip address dhcp
        parents: interface GigabitEthernet1

    - name: Activation et description des interfaces
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: Lien WAN DHCP
            enabled: true
          - name: GigabitEthernet2
            description: LAN Entreprise
            enabled: true
          - name: GigabitEthernet3
            description: LAN DMZ
            enabled: true
          - name: GigabitEthernet4
            description: LAN ADMIN
            enabled: true
        state: merged

    - name: Suppression pool DHCP existant
      cisco.ios.ios_config:
        lines:
          - no ip dhcp pool LAN_ENTREPRISE

    - name: Configuration serveur DHCP
      cisco.ios.ios_config:
        lines:
          - network 192.168.2.0 255.255.255.0
          - default-router 192.168.2.1
          - dns-server 8.8.8.8
        parents: ip dhcp pool LAN_ENTREPRISE

    
    - name: ip nat outside sur GigabitEthernet1
      cisco.ios.ios_config:
        lines:
          - ip nat outside
        parents: interface GigabitEthernet1

    - name: ip nat inside sur interfaces LAN
      cisco.ios.ios_config:
        lines:
          - ip nat inside
        parents: "interface {{ item }}"
      loop:
        - GigabitEthernet2
        - GigabitEthernet3
        - GigabitEthernet4

    - name: ACL pour NAT dynamique
      cisco.ios.ios_config:
        lines:
          - access-list 1 permit 192.168.0.0 0.0.255.255

    - name: Activation NAT dynamique
      cisco.ios.ios_config:
        lines:
          - ip nat inside source list 1 interface GigabitEthernet1 overload


    - name: PAT port 80 vers serveur web 192.168.3.2
      cisco.ios.ios_config:
        lines:
          - ip nat inside source static tcp 192.168.3.2 80 interface GigabitEthernet1 80

    - name: PAT port 2222 vers serveur SSH 192.168.4.2
      cisco.ios.ios_config:
        lines:
          - ip nat inside source static tcp 192.168.4.2 22 interface GigabitEthernet1 2222